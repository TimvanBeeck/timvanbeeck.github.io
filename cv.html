<body>

  <!-- ── Navigation ── -->
  <nav id="navbar">
    <a href="index.html" class="nav-brand">Tim van Beeck</a>

      <span></span>

      <li><a href="cv.html" class="active">Curriculum Vitae</a></li>
    </ul>
  </nav>

  <main>

     <!-- ── Download ── -->
     <section id="download" class="alt-bg">
      <div class="container cv-section">
        <h2>Full CV</h2>
        <p>Download my complete academic CV as a PDF.</p>
        <a href="assets/cv.pdf" download class="cv-button">
          <i class="fas fa-download"></i>&nbsp; Download PDF
        </a>
      </div>
    </section>

    <!-- ── Experience ── -->
    <section id="experience" class="alt-bg">
      <div class="container">
        <h2>Experience</h2>
        <div class="timeline" id="cv-experience">
          <p class="loading-msg">Loading…</p>
        </div>

        <h3 class="subsection-title subsection-title--spaced">Teaching</h3>
        <div class="teaching-grid" id="cv-teaching">
          <p class="loading-msg">Loading…</p>
        </div>
      </div>
    </section>

    <!-- ── Education ── -->
    <section id="education">
      <div class="container">
        <h2>Education</h2>
        <div class="timeline" id="cv-education">
          <p class="loading-msg">Loading…</p>
        </div>
      </div>
    </section>



  </main>

  <footer>
    <div class="container footer-inner">
      <p>&copy; 2026 Tim van Beeck</p>
    </div>
  </footer>

  <!-- ── Citation Modal ── -->
  <div id="cite-modal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="cite-modal-title">
    <div class="modal-box">
      <div class="modal-header">
        <span id="cite-modal-title" class="modal-title">BibTeX Citation</span>
        <button class="modal-close" aria-label="Close">&times;</button>
      </div>
      <pre class="modal-pre"><code id="cite-bib-content"></code></pre>
      <div class="modal-footer">
        <button id="copy-bib-btn" class="copy-btn">
          <i class="fas fa-copy"></i> Copy to clipboard
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
